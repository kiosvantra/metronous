project_name: metronous
version: 2
archives:
  - type: tar.gz
    type_overrides:
      - goos: windows
        type: zip
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
release:
  github:
    owner: kiosvantra
    name: metronous
  draft: false
  prerelease: auto
  extra_files:
    - glob: ./install.sh
builds:
  - id: metronous
    binary: metronous
    main: ./cmd/metronous
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/kiosvantra/metronous/internal/version.Version={{ .Version }}
