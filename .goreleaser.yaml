project_name: metronous
version: 1
archives:
  - format: tar.gz
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
release:
  github:
    owner: kiosvantra
    name: metronous
  draft: false
  prerelease: auto
builds:
  - id: metronous
    binary: metronous
    main: ./cmd/metronous
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/kiosvantra/metronous/cmd/metronous/commands.Version={{ .Version }}
