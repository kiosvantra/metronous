name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          FILENAME="metronous-${{ steps.version.outputs.VERSION }}-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "-X github.com/kiosvantra/metronous/cmd/metronous/commands.Version=${{ steps.version.outputs.VERSION }}" -o "$FILENAME" ./cmd/metronous

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: metronous-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
