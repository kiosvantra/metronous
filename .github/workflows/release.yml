name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          go build -ldflags "-X github.com/kiosvantra/metronous/cmd/metronous/commands.Version=${{ steps.version.outputs.VERSION }}" -o metronous ./cmd/metronous

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: metronous
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
