name: Versioning - Auto bump + tag on main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute next version (SemVer) and release notes
        run: |
          python .github/scripts/bump-version.py --out-version version.txt --out-notes release_notes.md

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="$(cat version.txt | tr -d '\n')"
          TAG="$NEW_VERSION"

          echo "Next version: $TAG"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; skipping"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Annotated tag for better release metadata.
          git tag -a "$TAG" -m "Release $TAG" HEAD

          # Push tag (this triggers .github/workflows/release.yml)
          git push origin "$TAG"
